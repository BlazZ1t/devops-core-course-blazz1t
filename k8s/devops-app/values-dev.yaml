# Development environment configuration
replicaCount: 1

image:
  repository: blazz1t/devops_app
  tag: "latest"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  targetPort: 8000
  protocol: TCP
  name: http
  # Let Kubernetes auto-assign nodePort in dev

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi

probes:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0

container:
  args:
    - "--port"
    - "8000"
  port: 8000