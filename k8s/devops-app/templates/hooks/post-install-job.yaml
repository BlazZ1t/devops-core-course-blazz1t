apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "devops-app.fullname" . }}-post-install"
  labels:
    {{- include "devops-app.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: "{{ include "devops-app.fullname" . }}-post-install"
      labels:
        {{- include "devops-app.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
      - name: post-install-job
        image: alpine:latest
        command: ['sh', '-c', 'echo "🎯 Post-install hook starting at $(date)" && sleep 5 && echo "✅ Post-install hook completed"']