# Default values for devops-app
replicaCount: 5

image:
  repository: blazz1t/devops_app
  tag: "2026.03.28"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

secrets:
  username: "placeholder-user"
  password: "placeholder-pass"

config:
  environment: "dev"
  logLevel: "INFO"
  serviceName: "devops-info-service"

persistence:
  enabled: true
  size: 100Mi
  storageClass: ""  # Use cluster default

service:
  type: NodePort
  port: 80
  targetPort: 8000
  protocol: TCP
  name: http

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

probes:
  liveness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3
  readiness:
    path: /health
    port: 8000
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

container:
  args:
    - "--port"
    - "8000"
  port: 8000

rollingUpdate:
  maxSurge: 1
  maxUnavailable: 0
