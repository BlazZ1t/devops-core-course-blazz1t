---
docker_apt_prerequisites:
  - ca-certificates
  - curl

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_python_package: python3-docker
docker_manage_user: "{{ ansible_user }}"

docker_arch_map:
  x86_64: amd64
  aarch64: arm64
  armv7l: armhf

docker_arch: "{{ docker_arch_map.get(ansible_architecture, ansible_architecture) }}"
