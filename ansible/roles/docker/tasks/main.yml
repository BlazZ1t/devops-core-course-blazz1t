---
- name: Docker role tasks
  block:

    - name: Docker installation
      block:

        - name: Install Docker apt prerequisites
          ansible.builtin.apt:
            name: "{{ docker_apt_prerequisites }}"
            state: present
            update_cache: true
            cache_valid_time: 3600

        - name: Ensure apt keyrings directory exists
          ansible.builtin.file:
            path: /etc/apt/keyrings
            state: directory
            mode: "0755"

        - name: Add Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

        - name: Add Docker apt repository
          ansible.builtin.apt_repository:
            repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
            filename: docker
            state: present
          notify: restart docker

        - name: Install Docker packages
          ansible.builtin.apt:
            name: "{{ docker_packages }}"
            state: present
            update_cache: true
          notify: restart docker

        - name: Install Docker Python package for Ansible modules
          ansible.builtin.apt:
            name: "{{ docker_python_package }}"
            state: present

      rescue:

        - name: Wait before retrying Docker GPG setup
          ansible.builtin.pause:
            seconds: 10

        - name: Retry apt cache update
          ansible.builtin.apt:
            update_cache: true

        - name: Retry adding Docker GPG key
          ansible.builtin.get_url:
            url: https://download.docker.com/linux/ubuntu/gpg
            dest: /etc/apt/keyrings/docker.asc
            mode: "0644"

      tags:
        - docker_install

    - name: Docker configuration
      block:

        - name: Add user to docker group
          ansible.builtin.user:
            name: "{{ docker_manage_user }}"
            groups: docker
            append: true

      tags:
        - docker_config

  always:

    - name: Ensure Docker service is enabled and running
      ansible.builtin.service:
        name: docker
        state: started
        enabled: true

  become: true
  tags:
    - docker