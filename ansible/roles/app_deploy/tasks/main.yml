---
- name: Log in to Docker Hub
  community.docker.docker_login:
    registry_url: https://index.docker.io/v1/
    username: "{{ dockerhub_username }}"
    password: "{{ dockerhub_password }}"
  no_log: true

- name: Pull application image
  community.docker.docker_image:
    name: "{{ docker_image }}"
    tag: "{{ docker_image_tag }}"
    source: pull

- name: Stop existing application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: stopped
  ignore_errors: true

- name: Remove existing application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    state: absent

- name: Run application container
  community.docker.docker_container:
    name: "{{ app_container_name }}"
    image: "{{ docker_image }}:{{ docker_image_tag }}"
    state: started
    restart_policy: "{{ app_restart_policy }}"
    ports:
      - "{{ app_port }}:5000"
    env: "{{ app_environment }}"

- name: Wait for application port
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: "{{ app_port | int }}"
    timeout: 60

- name: Verify application health endpoint
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}/health"
    method: GET
    status_code: 200
  register: app_health
  retries: 10
  delay: 3
  until: app_health.status == 200
